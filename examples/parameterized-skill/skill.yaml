apiVersion: skillctl.io/v1
kind: Skill

metadata:
  name: my-org/parameterized-skill
  version: 1.0.0
  description: "A skill demonstrating parameter types including enums"
  authors:
    - name: Bob
      email: bob@example.com
  license: Apache-2.0
  tags:
    - example
    - parameterized

spec:
  content:
    path: ./SKILL.md
  parameters:
    - name: language
      type: string
      required: false
      default: "auto-detect"
      description: "Target programming language"
    - name: strictness
      type: enum
      values: ["low", "medium", "high"]
      default: "medium"
      description: "How strict the analysis should be"
    - name: max-issues
      type: number
      required: false
      default: "10"
      description: "Maximum number of issues to report"
    - name: verbose
      type: boolean
      required: false
      default: "false"
      description: "Enable verbose output"
  capabilities:
    - read_file
    - read_code
